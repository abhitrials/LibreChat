version: 1.1.5
cache: true
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openrouter/auto"]
        fetch: true
summarization:
  model: 'openrouter/auto'

# Turn OFF basic memory so it relies 100% on your Supabase Tool
memory:
  disabled: true

# Connect to your brand new MCP API!
mcpServers:
  supabase-memory:
    type: sse
    url: "https://librechat-memory-api.onrender.com/sse"
    headers:
      X-Chat-ID: '{{LIBRECHAT_BODY_CONVERSATIONID}}'
