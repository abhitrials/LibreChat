version: 1.1.5
cache: true
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openrouter/auto"]
        fetch: true
summarization:
  model: 'openrouter/auto'

memory:
  disabled: true

mcpServers:
  supabase-memory:
    type: sse
    # --- NEW URL: This uses Render's private internal network! ---
    url: "http://librechat-memory-api:10000/sse"
    chatMenu: false
