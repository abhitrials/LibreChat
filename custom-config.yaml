version: 1.1.5
cache: true
endpoints:
  custom:
    - name: "OpenRouter"
      apiKey: "${OPENROUTER_KEY}"
      baseURL: "https://openrouter.ai/api/v1"
      models:
        default: ["openrouter/auto"]
        fetch: true
summarization:
  model: 'openrouter/auto'

# Basic memory remains OFF
memory:
  disabled: true

mcpServers:
  supabase-memory:
    type: sse
    url: "https://librechat-memory-api.onrender.com/sse"
    chatMenu: false  # THIS IS THE MAGIC FIX YOU FOUND!
    headers:
      X-Chat-ID: '{{LIBRECHAT_BODY_CONVERSATIONID}}'
